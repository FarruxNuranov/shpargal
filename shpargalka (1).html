<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шпаргалка — Электронная коммерция</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f7f8fc;
    --border: #e8eaf0;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --correct: #16a34a;
    --correct-bg: #f0fdf4;
    --correct-border: #bbf7d0;
    --wrong: #6b7280;
    --text: #111827;
    --sub: #6b7280;
    --num: #2563eb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Mulish', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    color: #fff;
    padding: 18px 16px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(37,99,235,0.18);
  }

  .header-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    opacity: 0.95;
  }

  .search-wrap {
    position: relative;
  }

  #search {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Mulish', sans-serif;
    background: rgba(255,255,255,0.18);
    color: #fff;
    outline: none;
    transition: background 0.2s;
  }

  #search::placeholder { color: rgba(255,255,255,0.65); }
  #search:focus { background: rgba(255,255,255,0.28); }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
    opacity: 0.8;
  }

  .stats {
    padding: 10px 16px 4px;
    font-size: 12px;
    color: var(--sub);
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .list {
    padding: 4px 12px 40px;
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }

  .card:active { box-shadow: 0 2px 12px rgba(37,99,235,0.08); }

  .card-head {
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .q-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border-radius: 7px;
    padding: 3px 7px;
    min-width: 34px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .q-text {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.45;
    color: var(--text);
    flex: 1;
  }

  .q-preview {
    font-size: 12px;
    color: var(--correct);
    font-weight: 700;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toggle-icon {
    font-size: 18px;
    color: var(--sub);
    flex-shrink: 0;
    margin-top: 2px;
    transition: transform 0.2s;
  }

  .card.open .toggle-icon { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1.5px solid var(--border);
  }

  .card.open .card-body { display: block; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 9px;
    margin-top: 6px;
    border: 1.5px solid transparent;
  }

  .option.correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
  }

  .option.wrong {
    opacity: 0.55;
  }

  .opt-letter {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .option.correct .opt-letter {
    background: var(--correct);
    color: #fff;
  }

  .option.wrong .opt-letter {
    background: var(--border);
    color: var(--sub);
  }

  .opt-text {
    font-size: 13.5px;
    line-height: 1.4;
    font-weight: 600;
  }

  .option.correct .opt-text { color: var(--correct); }
  .option.wrong .opt-text { color: var(--wrong); }

  .hidden { display: none !important; }

  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--sub);
    font-size: 15px;
    font-weight: 600;
  }

  mark {
    background: #fef08a;
    border-radius: 3px;
    padding: 0 1px;
    color: inherit;
  }
</style>
</head>
<body>

<header>
  <div class="header-title">📚 Электронная коммерция — шпаргалка</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Поиск по вопросу или ответу..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</header>

<div class="stats" id="stats">Загрузка...</div>
<div class="list" id="list"></div>

<script>
const questions = [
  {q:"Электронная платёжная система (ЭПС) представляет собой совокупность средств, обеспечивающих проведение финансовых транзакций. Какая функция отличает ЭПС от простого перевода средств между счетами?",opts:["Выступление связующим звеном между участниками с гарантией корректности расчётов","Обеспечение исключительно хранения денег на кошельке пользователя","Предоставление исключительно обменных валютных операций онлайн","Выполнение только функций кредитования покупателей"],ans:0},
  {q:"Классификация электронных платёжных систем включает карточные системы, электронные кошельки, криптовалюты и мобильные платежи. Какой критерий положен в основу разделения систем на централизованные и децентрализованные?",opts:["Наличие либо отсутствие единого эмитента и контролирующего органа","Скоростные характеристики проведения транзакций","Валюта номинирования расчётов между сторонами","Географическое происхождение разработчика системы"],ans:0},
  {q:"Покупатель в интернет-магазине выбирает способ оплаты. Он может ввести данные карты (Visa) или перейти в приложение Apple Pay. К какому типу ЭПС относятся эти два способа?",opts:["Карточная система и система мобильных платежей с токенизацией","Электронный кошелёк и криптовалютная система переводов","Система электронных переводов и карточная система","Децентрализованная и централизованная системы расчётов"],ans:0},
  {q:"Электронные деньги выполняют функцию средства накопления, однако эта функция ограничена. В чем заключается основное ограничение?",opts:["Отсутствие начисления процентного дохода на остатки средств","Невозможность конвертации в наличные денежные средства","Ограничение срока хранения одним календарным годом","Возможность накопления только в криптовалюте"],ans:0},
  {q:"Предприниматель хранит крупную сумму на корпоративном электронном кошельке для расчётов с поставщиками. За год инфляция составила 10%, а остаток на кошельке не изменился. С какой проблемой электронных денег столкнулся предприниматель?",opts:["Отсутствие защиты от инфляции при отсутствии доходности","Проблематичность конвертации в наличные средства","Ограничение максимальной суммы хранения","Высокая комиссия за хранение средств"],ans:0},
  {q:"Какие данные из перечисленных относятся к недостаткам электронных денег, связанным с контролем и безопасностью?",opts:["Отсутствие надёжности при сбоях и риск хакерских атак","Высокая скорость транзакций и низкие комиссии","Анонимность расчётов и простота открытия кошелька","Возможность микроплатежей и интеграция с приложениями"],ans:0},
  {q:"В технологической цепочке электронного платежа ключевую роль играет платёжный шлюз (payment gateway). Какова его основная функция?",opts:["Обеспечение безопасной передачи данных с использованием шифрования","Непосредственное физическое хранение денег покупателя","Эмиссия банковских карт различных платёжных систем","Доставка товара от продавца к покупателю"],ans:0},
  {q:"Клиент оформляет заказ на сайте и вводит данные карты. Адресная строка браузера отображает замок и протокол HTTPS. Какой протокол обеспечивает безопасность передачи данных на этом этапе?",opts:["SSL/TLS, шифрующий канал связи между браузером и сервером","SET, разработанный для аутентификации участников сделки","3-D Secure, требующий ввода одноразового кода","Протокол электронного перевода e-Transfer"],ans:0},
  {q:"Протокол 3-D Secure используется при онлайн-транзакциях. Что он обеспечивает?",opts:["Дополнительную аутентификацию держателя карты через одноразовый код","Шифрование всего канала связи между участниками","Полную анонимность плательщика при совершении операции","Мгновенное зачисление средств продавцу"],ans:0},
  {q:"В чём заключается принципиальное отличие цифровых денег (например, криптовалют) от традиционных электронных денег (например, средств на кошельке WebMoney)?",opts:["В механизме эмиссии и контроля: децентрализованный/централизованный","В возможности оплаты товаров и услуг через онлайн платформы","В выражении стоимости в денежных единицах","В скорости проведения транзакций"],ans:0},
  {q:"Центральный банк страны объявил о запуске цифровой национальной валюты, которая станет третьей формой денег наряду с наличными и безналичными. О какой форме цифровых денег идёт речь?",opts:["Централизованная цифровая валюта (CBDC), например цифровой рубль","Децентрализованная криптовалюта, например Bitcoin","Электронные деньги частного оператора, например QIWI","Стейблкоин, обеспеченный золотом или фиатом"],ans:0},
  {q:"Технология блокчейн лежит в основе большинства криптовалют. Какое ключевое свойство обеспечивается за счёт формирования цепочки блоков, связанных криптографическими хешами?",opts:["Иммутабельность и неизменяемость записанных данных","Высокая скорость проведения транзакций","Полная анонимность всех участников сети","Возможность отмены транзакции эмитентом"],ans:0},
  {q:"Пользователь инициирует перевод криптовалюты. После подписания транзакции своим закрытым ключом она транслируется в сеть. На каком этапе транзакция становится необратимой частью реестра?",opts:["После формирования блока и добавления в цепочку через консенсус","Сразу после подписания закрытым ключом отправителя","После проверки баланса одним узлом сети","После получения подтверждения от банка-корреспондента"],ans:0},
  {q:"Аналитика рынка электронных платежей показывает доминирование определённых инструментов. Какая категория платежей занимает наибольшую долю (42%) в структуре глобальных транзакций?",opts:["Банковские карты различных платёжных систем","Электронные кошельки частных операторов","Мобильные платежи через приложения","Криптовалютные переводы"],ans:0},
  {q:"Какой сегмент платёжного рынка демонстрирует наибольшую динамику роста (+35% ежегодно)?",opts:["Мобильные платежи с использованием NFC и QR-кодов","Криптовалютные переводы между пользователями","Банковские переводы по системам SEPA и SWIFT","Карточные транзакции в торговых точках"],ans:0},
  {q:"Стартап разрабатывает приложение для оплаты товаров в офлайн-магазинах с помощью сканирования QR-кода через смартфон. К какой категории ЭПС относится данное решение?",opts:["Система мобильных платежей на основе QR-кодов","Карточная система для операций Card-Present","Электронный кошелёк с функцией хранения","Криптовалютная система на блокчейне"],ans:0},
  {q:"Информационная безопасность в электронной коммерции — это комплекс мер. На что в первую очередь направлены эти меры согласно определению?",opts:["Защита информации от доступа, модификации, уничтожения и блокирования","Увеличение скорости обработки заказов покупателей","Маркетинговое продвижение товаров в сети","Автоматизация складского учёта и логистики"],ans:0},
  {q:"Какая угроза информационной безопасности, по статистике, является начальной точкой для 90% успешных кибератак?",opts:["Фишинг и методы социальной инженерии","DDoS-атаки на веб-серверы","Вредоносное ПО типа программ-вымогателей","Утечки данных из-за взлома баз данных"],ans:0},
  {q:"Сотрудник компании получил электронное письмо, якобы от руководителя, с просьбой срочно перевести крупную сумму на указанный счёт. Письмо содержало ссылку на фишинговый сайт. Какая угроза была реализована?",opts:["Социальная инженерия с использованием фишинга","DDoS-атака на сервер компании","Внедрение программы-вымогателя ransomware","Перехват трафика MITM-атака"],ans:0},

  {q:"Каково среднее время выявления утечки данных в организациях?",opts:["197 дней с момента начала утечки","24 часа с момента инцидента","30 календарных дней","1 год с момента утечки"],ans:0},

  {q:"Бухгалтер компании подписывает электронный платёжный документ с использованием электронной подписи. Какой принцип триады CIA в первую очередь обеспечивается применением электронной подписи?",opts:["Целостность и подтверждение авторства","Конфиденциальность данных документа","Доступность сервиса подписания","Анонимность плательщика"],ans:0},

const LETTERS = ['A','B','C','D'];

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function render(filter) {
  const list = document.getElementById('list');
  const stats = document.getElementById('stats');
  list.innerHTML = '';
  const q = filter ? filter.toLowerCase() : '';
  let shown = 0;

  questions.forEach((item, i) => {
    const matchQ = item.q.toLowerCase().includes(q);
    const matchA = item.opts.some(o => o.toLowerCase().includes(q));
    if (q && !matchQ && !matchA) return;
    shown++;

    const card = document.createElement('div');
    card.className = 'card';

    const correctText = item.opts[item.ans];
    const headHTML = `
      <div class="card-head" onclick="toggle(this)">
        <div class="q-num">${String(i+1).padStart(2,'0')}</div>
        <div style="flex:1">
          <div class="q-text">${highlight(item.q, filter)}</div>
          <div class="q-preview">✓ ${highlight(correctText, filter)}</div>
        </div>
        <div class="toggle-icon">▾</div>
      </div>`;

    let optsHTML = '<div class="card-body">';
    item.opts.forEach((opt, j) => {
      const isCorrect = j === item.ans;
      optsHTML += `<div class="option ${isCorrect ? 'correct' : 'wrong'}">
        <div class="opt-letter">${LETTERS[j]}</div>
        <div class="opt-text">${highlight(opt, filter)}</div>
      </div>`;
    });
    optsHTML += '</div>';

    card.innerHTML = headHTML + optsHTML;
    list.appendChild(card);
  });

  stats.textContent = q
    ? `Найдено: ${shown} из ${questions.length} вопросов`
    : `Всего вопросов: ${questions.length}`;

  if (shown === 0) {
    list.innerHTML = '<div class="no-results">😕 Ничего не найдено</div>';
  }
}

function toggle(el) {
  const card = el.closest('.card');
  card.classList.toggle('open');
}

let searchTimeout;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => render(this.value.trim()), 180);
});

render('');
</script>
